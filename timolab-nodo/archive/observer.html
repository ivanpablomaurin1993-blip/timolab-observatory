<h2>OBSERVER NODE</h2>

<p>
Every experiment assumes an observer.
</p>

<p>
But the observer is also part of the system.
</p>

<p>
This raises a problem.
</p>

<p>
If the observer influences the experiment,
who observes the observer?
</p>

<p>
And if no observer exists outside the system,
can the system ever truly understand itself?
</p>
