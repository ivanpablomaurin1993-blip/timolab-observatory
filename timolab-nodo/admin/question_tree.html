<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>TIMOLAB QUESTION TREE</title>

<style>

body{
background:#000;
color:#00ff9c;
font-family:monospace;
padding:40px;
}

.node{
border-left:2px solid #00ff9c;
margin-bottom:20px;
padding-left:15px;
}

.question{
color:#ffcc00;
}

.answer{
color:#00ffff;
}

.next{
color:#ff0055;
}

</style>

</head>

<body>

<h1>🧠 TIMOLAB QUESTION TREE</h1>

<div id="tree"></div>

<script>

async function loadTree(){

const res = await fetch('/api/read_questions')
const data = await res.json()

const container = document.getElementById("tree")

container.innerHTML=""

data.forEach(node=>{

const div = document.createElement("div")
div.className="node"

div.innerHTML = `
<div class="question">Q: ${node.question}</div>
<div class="answer">A: ${node.answer}</div>
<div class="next">Next: ${node.next_question}</div>
`

container.appendChild(div)

})

}

loadTree()

setInterval(loadTree,8000)

</script>

</body>
</html>
