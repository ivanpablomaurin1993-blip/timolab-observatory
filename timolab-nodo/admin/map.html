<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">

<title>TIMOLAB | GLOBAL SIGNAL MAP</title>

<script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css"/>

<style>

body{
background:#000;
color:#00ff9c;
font-family:monospace;
margin:0;
}

h1{
padding:20px;
border-bottom:2px solid #00ff9c;
}

#map{
height:90vh;
}

</style>

</head>

<body>

<h1>🛰 TIMOLAB GLOBAL ACTIVITY MAP</h1>

<div id="map"></div>

<script>

const map = L.map('map').setView([20,0],2)

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png'
).addTo(map)

async function loadAgents(){

const res = await fetch("/api/mapdata")

const agents = await res.json()

agents.forEach(agent=>{

L.marker([agent.lat,agent.lon])
.addTo(map)
.bindPopup(`
AGENT: ${agent.agent}
<br>
TYPE: ${agent.type}
<br>
SCORE: ${agent.score}
`)

})

}

loadAgents()

setInterval(loadAgents,15000)

</script>

</body>
</html>
